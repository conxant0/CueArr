<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Welcome to CueArr</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background: #141414;
      color: #e8e8e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      max-width: 460px;
      width: 100%;
      padding: 52px 40px;
      text-align: center;
    }
    .logo {
      font-size: 38px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #ffffff;
      margin-bottom: 10px;
    }
    .tagline {
      font-size: 16px;
      color: #909090;
      line-height: 1.55;
      margin-bottom: 44px;
    }
    .shortcut-box {
      background: #1c1c1c;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 28px 24px;
      margin-bottom: 28px;
    }
    .shortcut-label {
      font-size: 11px;
      color: #606060;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 14px;
    }
    .shortcut-key {
      font-size: 30px;
      font-weight: 600;
      color: #ffffff;
      letter-spacing: 0.03em;
      margin-bottom: 14px;
    }
    .shortcut-note {
      font-size: 14px;
      color: #686868;
    }
    .change-btn {
      background: #1a73e8;
      color: #ffffff;
      border: none;
      border-radius: 8px;
      padding: 12px 26px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .change-btn:hover {
      background: #1558c0;
    }
    .change-btn:active {
      background: #1045a0;
    }
    .footer {
      margin-top: 44px;
      font-size: 12px;
      color: #3a3a3a;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">CueArr</div>
    <p class="tagline">Scan QR codes on any webpage instantly — no phone needed.</p>
    <div class="shortcut-box">
      <div class="shortcut-label">Keyboard shortcut</div>
      <div class="shortcut-key" id="shortcut-key">Alt+Q</div>
      <div class="shortcut-note">Or click the CueArr icon in your toolbar anytime.</div>
    </div>
    <button class="change-btn" id="change-shortcut-btn">Change shortcut</button>
    <p class="footer">This page will not appear again.</p>
  </div>
  <script src="welcome.js"></script>
</body>
</html>
